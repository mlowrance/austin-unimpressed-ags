name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Game
        # Using the official community action
        uses: adventuregamestudio/ags-build-action@v1
        with:
          # This tells the builder to specifically target the Web
          target: web

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This assumes your web files land in Compiled/Web
          path: 'Compiled/Web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4