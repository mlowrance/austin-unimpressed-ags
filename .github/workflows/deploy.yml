name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # We use the direct Docker image as our environment
    container:
      image: rolandlo/ags-build:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Game for Web
        run: |
          # 1. Create the output directory
          mkdir -p Compiled/Web
          # 2. Run the ags compiler specifically for the web target
          # The dot '.' looks for the .agf in the current folder
          ags --build-target web .

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Compiled/Web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4