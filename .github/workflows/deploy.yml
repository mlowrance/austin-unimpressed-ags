name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-ags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build AGS Game for Web
        # We use a Docker container that has the AGS Linux compiler
        uses: docker://ericoporto/ags-build:latest
        with:
          # This command tells the compiler to build specifically for Web/Emscripten
          args: /bin/bash -c "ags --build-target web ."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # AGS outputs web builds to Compiled/Web by default
          path: 'Compiled/Web'

  deploy:
    needs: build-ags
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4