name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AGS Editor
        shell: pwsh
        run: |
          # Downloading the specific 3.6.2.18 release zip
          $url = "https://github.com/adventuregamestudio/ags/releases/download/v3.6.2.18/AGS-3.6.2.18-P8.zip"
          Invoke-WebRequest -Uri $url -OutFile "ags.zip"
          Expand-Archive -Path "ags.zip" -DestinationPath "AGSEditor"

      - name: Build Game for Web
        shell: cmd
        run: |
          # 1. Run the compile
          .\AGSEditor\AGSEditor.exe /compile "Game.agf"
          
          # 2. SANITY CHECK: See what was actually created
          echo --- BUILD DIRECTORY FILING ---
          dir /s Compiled
          
          # 3. If Compiled\Web is empty, we need to move the files 
          # Some versions of AGS put the web files in _Debug or a different subfolder
          if not exist "Compiled\Web\index.html" (
            echo WARNING: index.html not found in Compiled\Web. Checking other locations...
            if exist "Compiled\Web\launcher_index.html" ren "Compiled\Web\launcher_index.html" "index.html"
          )
          
          # 4. Final Fail-Safe: If the folder is still empty, stop the workflow here
          if not exist "Compiled\Web\index.html" (
            echo ERROR: Web build failed to produce index.html.
            exit 1
          )

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Compiled/Web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4