name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AGS Editor
        shell: pwsh
        run: |
          # Downloading the specific 3.6.2.18 release zip
          $url = "https://github.com/adventuregamestudio/ags/releases/download/v3.6.2.18/AGS-3.6.2.18-P8.zip"
          Invoke-WebRequest -Uri $url -OutFile "ags.zip"
          Expand-Archive -Path "ags.zip" -DestinationPath "AGSEditor"

      - name: Build Game for Web
        shell: cmd
        run: |
          # 1. Ensure the directory exists
          if not exist "Compiled\Web" mkdir "Compiled\Web"
          # 2. Run the compiler
          # Note: We use /compile which is the standard flag for the Windows Editor
          .\AGSEditor\AGSEditor.exe /compile "Game.agf"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Compiled/Web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4