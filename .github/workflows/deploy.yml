name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install AGS Compiler
        run: |
          sudo add-apt-repository ppa:adventuregamestudio/ppa -y
          sudo apt-get update
          sudo apt-get install -y ags

      - name: Build Game for Web
        run: |
          mkdir -p Compiled/Web
          # Using the system-installed 'ags' to build
          # The '.' tells it to look for the .agf in the root
          ags --build-target web .

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Compiled/Web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4