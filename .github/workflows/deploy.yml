name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download AGS Editor
        shell: pwsh
        run: |
          # Downloading the specific 3.6.2.18 release zip
          $url = "https://github.com/adventuregamestudio/ags/releases/download/v3.6.2.18/AGS-3.6.2.18-P8.zip"
          Invoke-WebRequest -Uri $url -OutFile "ags.zip"
          Expand-Archive -Path "ags.zip" -DestinationPath "AGSEditor"

      - name: Build Game for Web
        shell: cmd
        run: |
          :: 1. Find where the .agf file actually is
          dir /s /b *.agf > agf_path.txt
          set /p AGF_FILE=<agf_path.txt
          echo Detected Project File: %AGF_FILE%

          :: 2. Run the compile using the detected path
          .\AGSEditor\AGSEditor.exe /compile "%AGF_FILE%"
          
          :: 3. Create Web folder if it doesn't exist (just in case)
          if not exist "Compiled\Web" mkdir "Compiled\Web"

          :: 4. Force rename any output to index.html
          if exist "Compiled\Web\launcher_index.html" ren "Compiled\Web\launcher_index.html" "index.html"
          if exist "Compiled\Web\Game.html" ren "Compiled\Web\Game.html" "index.html"

          :: 5. Final check to see what we actually have
          dir /s Compiled
          
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Compiled/Web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4