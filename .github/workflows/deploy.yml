name: Build and Deploy AGS Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liballegro4.4 libpcre3-dev

      - name: Download AGS Linux Compiler
        run: |
          # Downloading the 3.6.1.26 release (Stable Linux build)
          wget https://github.com/adventuregamestudio/ags/releases/download/v.3.6.1.26/ags_3.6.1.26_linux.tar.gz
          tar -xzf ags_3.6.1.26_linux.tar.gz
          # Move the compiler to a usable path
          chmod +x ./ags

      - name: Build Game for Web
        run: |
          mkdir -p Compiled/Web
          # Using the downloaded binary to compile the .agf file
          # Ensure your filename matches exactly (e.g., Game.agf)
          ./ags --build-target web .

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Compiled/Web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4